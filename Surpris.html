
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Une surprise pour Neny ❤️</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    color:white;
}

.container{
    margin-top:100px;
}

h1{
    font-size:40px;
}

p{
    font-size:20px;
    width:70%;
    margin:auto;
    border: black solid 4px;
    padding:30px ;
    border-radius:100px;
}

button{
    margin-top:30px;
    margin: 20px ;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:1rem;
    background:#FF6F4A;
    color:White;
    cursor:pointer;
    transition:0.3s;
    box-shadow: 10px 10px 20pc #babecc,-10px -10px 20px #FFDAD1;
}

button:hover{
    background:#ff4b6e;
    color:white;
}

#message{
    margin-top:30px;
    font-size:24px;
    display:none;
}

/* animation coeur */

.heart{
    position:fixed;
    bottom:-50px;
    font-size:30px;
    animation:float 5s infinite;
}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>Pour Neny ❤️</h1>

<p>
Je sais que j'ai fait quelque chose qui t'a mis malheureuse.  
Je suis vraiment désolé 🙏 .  
Tu comptes énormément pour moi et je veux toujours te voir sourire😁.  
Alors j'ai créé cette petite page juste pour toi, et pour m'excuser.
</p>

<button onclick="surprise()">"Clique ici Neny ❤️" </button>

<div id="message">
Je t'aime et je promets de faire mieux 💖
</div>

</div>

<script>

function surprise(){
    document.getElementById("message").style.display="block";
}

/* création des coeurs */

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*2)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
